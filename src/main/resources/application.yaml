
server:
  port: 9000
spring:
  application:
    name: training-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: 'jdbc:postgresql://localhost:5000/training-service-db'
    username: postgres
    password: postgres
  liquibase:
    driver-class-name: org.postgresql.Driver
    url: 'jdbc:postgresql://localhost:5000/training-service-db'
    user: postgres
    password: postgres
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        highlight_sql: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1000MB
logging:
  level:
    org.springframework.transaction.interceptor: TRACE
    org.springframework.orm.jpa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE