
services:

  postgres:
    image: postgres:latest
    container_name: training-service-postgres
    restart: unless-stopped
    ports:
      - "5000:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: training-service-db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: training-service-redis
    restart: unless-stopped
    ports:
      - "6000:6379"
    volumes:
      - redis-data:/var/lib/redis/data

  training-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    environment:
      PORT: 9000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/training-service-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres-data:
  redis-data: